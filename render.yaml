services:
  - type: web
    name: whatsapp-ai-bot
    runtime: docker
    plan: starter          # Render Starter = $7/month (free tier removed Nov 2023)
    disk:
      name: bot-data
      mountPath: /app/.wwebjs_auth
      sizeGB: 1
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS
        sync: false
      - key: GOOGLE_TOKEN
        sync: false
      - key: GOOGLE_CALENDAR_ENABLED
        value: "true"
      - key: GOOGLE_GMAIL_ENABLED
        value: "true"
      - key: PORT
        value: "3000"
      - key: CHROMIUM_PATH
        value: /usr/bin/chromium
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: whatsapp-ai-bot
          property: host
